version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: etcd
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
    ports:
      - "2379:2379"

  apisix:
    image: apache/apisix:3.6.0-debian
    container_name: apisix
    depends_on:
      - etcd
      - backend
    ports:
      - "9080:9080"
      - "9180:9180"
    volumes:
      - ./apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml

  # -----------------------
  # BACKEND (Command + Query)
  # -----------------------
  backend:
    image: python:3.9
    container_name: backend
    depends_on:
      - kafka
      - redis
    volumes:
      - ./backend:/app
    working_dir: /app
    command: >
      sh -c "pip install flask kafka-python redis &&
             python app.py"
    ports:
      - "5000:5000"

  # -----------------------
  # CONSUMER (Kafka → Redis)
  # -----------------------
  consumer:
    image: python:3.9
    container_name: consumer
    depends_on:
      - kafka
      - redis
    volumes:
      - ./consumer:/app
    working_dir: /app
    command: >
      sh -c "pip install kafka-python redis &&
             python consumer.py"

  # -----------------------
  # UI
  # -----------------------
  ui:
    image: nginx:alpine
    container_name: ui
    ports:
      - "8080:80"
    volumes:
      - ./ui:/usr/share/nginx/html